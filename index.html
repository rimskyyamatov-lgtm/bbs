<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FreeBBS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:sans-serif;
background:#e5ddd5;
display:flex;
justify-content:center;
margin-top:40px;
}

#chat{
width:400px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
padding:10px;
}

#messages{
height:400px;
overflow-y:auto;
background:#dcf8c6;
padding:10px;
border-radius:6px;
}

.msg{
background:white;
padding:6px;
border-radius:6px;
margin:5px;
}

.me{
background:#9de1fe;
}

textarea{
width:100%;
height:60px;
}

</style>

</head>
<body>

<div id="chat">

<h3>FreeBBS</h3>

<input id="name" placeholder="名前">
<input id="room" placeholder="部屋">

<button onclick="join()">入室</button>

<hr>

<div id="messages"></div>

<hr>

<textarea id="msg"></textarea>

<button onclick="send()">送信</button>

</div>

<script>

const SUPABASE_URL =
"https://amxxzcnmhfeppikwceyp.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFteHh6Y25taGZlcHBpa3djZXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTcxMDQsImV4cCI6MjA4ODY5MzEwNH0._-cQvXZw0MH4TNYrus48vMEKOW7HSQC87d7U1DMwZH8";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let currentRoom="";
let userName="";

function join(){

userName=document.getElementById("name").value;
currentRoom=document.getElementById("room").value;

if(!userName||!currentRoom){
alert("名前と部屋を入力");
return;
}

loadMessages();

}

async function send(){

const text=document.getElementById("msg").value;

if(!text||!currentRoom)return;

await supabase
.from("messages")
.insert({
room:currentRoom,
user_name:userName,
text:text,
time:Date.now()
});

document.getElementById("msg").value="";

}

async function loadMessages(){

const { data } =
await supabase
.from("messages")
.select("*")
.eq("room",currentRoom)
.order("time");

const box=document.getElementById("messages");
box.innerHTML="";

data.forEach(addMessage);

}

function addMessage(m){

const div=document.createElement("div");
div.className="msg";

if(m.user_name===userName){
div.classList.add("me");
}

const date=new Date(m.time);

div.innerHTML=
"<b>"+m.user_name+"</b> "+
date.toLocaleTimeString()+
"<br>"+m.text;

document.getElementById("messages").appendChild(div);

div.scrollIntoView();

}

supabase
.channel("chat")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"messages"
},
payload=>{

const msg=payload.new;

if(msg.room===currentRoom){
addMessage(msg);
}

}
)
.subscribe();

</script>

</body>
</html>
