<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FreeBBS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:sans-serif;
background:#e5ddd5;
display:flex;
justify-content:center;
}

#chat{
width:420px;
background:white;
margin-top:30px;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#messages{
height:400px;
overflow-y:auto;
background:#dcf8c6;
padding:10px;
border-radius:6px;
}

.msg{
background:white;
padding:6px;
margin:5px;
border-radius:6px;
}

.me{
background:#9de1fe;
}

textarea{
width:100%;
height:60px;
}

</style>

</head>
<body>

<div id="chat">

<h3>FreeBBS</h3>

<input id="name" placeholder="ユーザー名">

<br><br>

<input id="room" placeholder="部屋名">
<input id="roompass" placeholder="部屋パスワード">

<br>

<button onclick="createRoom()">部屋作成</button>
<button onclick="join()">入室</button>

<hr>

<div id="messages"></div>

<hr>

<textarea id="msg"></textarea>

<br>

<button onclick="send()">送信</button>

</div>

<script>

const SUPABASE_URL =
"https://amxxzcnmhfeppikwceyp.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFteHh6Y25taGZlcHBpa3djZXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTcxMDQsImV4cCI6MjA4ODY5MzEwNH0._-cQvXZw0MH4TNYrus48vMEKOW7HSQC87d7U1DMwZH8";

const { createClient } = supabase;

const db = createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let currentRoom="";
let userName="";
let userIP="unknown";

/* IP取得 */

async function getIP(){

try{

const res =
await fetch(
"https://api64.ipify.org?format=json"
);

const data=await res.json();

userIP=data.ip;

}catch{

console.log("IP取得失敗");

}

}

getIP();

/* 部屋作成 */

async function createRoom(){

const room=document.getElementById("room").value;
const pass=document.getElementById("roompass").value;

const { error } = await db
.from("rooms")
.insert({
name:room,
password:pass
});

if(error){

alert("部屋は既に存在");

}else{

alert("部屋作成成功");

}

}

/* 入室 */

async function join(){

userName=document.getElementById("name").value;

const room=document.getElementById("room").value;

const pass=document.getElementById("roompass").value;

const { data } = await db
.from("rooms")
.select("*")
.eq("name",room)
.single();

if(!data){

alert("部屋が存在しません");

return;

}

if(data.password && data.password!==pass){

alert("パスワード違う");

return;

}

currentRoom=room;

loadMessages();

}

/* 送信 */

async function send(){

const text=document.getElementById("msg").value;

if(!text||!currentRoom)return;

await db
.from("messages")
.insert({

room:currentRoom,
user_name:userName,
ip:userIP,
text:text,
time:Date.now()

});

document.getElementById("msg").value="";

}

/* メッセージ読み込み */

async function loadMessages(){

const { data } =
await db
.from("messages")
.select("*")
.eq("room",currentRoom)
.order("time");

const box=document.getElementById("messages");

box.innerHTML="";

if(data){

data.forEach(addMessage);

}

}

/* 表示 */

function addMessage(m){

const div=document.createElement("div");

div.className="msg";

if(m.user_name===userName){

div.classList.add("me");

}

const date=new Date(m.time);

div.innerHTML=

"<b>"+m.user_name+
"</b> ("+m.ip+") "+
date.toLocaleTimeString()+
"<br>"+m.text;

if(userName==="admin"){

const del=document.createElement("button");

del.innerText="削除";

del.onclick=async()=>{

await db
.from("messages")
.delete()
.eq("id",m.id);

div.remove();

};

div.appendChild(del);

}

document.getElementById("messages").appendChild(div);

div.scrollIntoView();

}

/* リアルタイム */

db
.channel("chat")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"messages"
},
payload=>{

const msg=payload.new;

if(msg.room===currentRoom){

addMessage(msg);

}

}
)
.subscribe();

</script>

</body>
</html>
